# BoT-SORT + appearance ReID — KEPT FOR REFERENCE, NOT RECOMMENDED.
#
# MEASURED RESULT (clip_003 x2, yolo11x): ReID did NOT reduce ID fragmentation
# and slightly increased duplicate tracks vs GMC-only:
#     bytetrack      : 28 / 39 distinct,  8 / 14 short-lived fragments
#     botsort_gmc    : 25 / 36 distinct,  3 / 12 short-lived   <-- best
#     botsort_reid   : 27 / 40 distinct,  3 / 15 short-lived
#
# Why it fails here:  ultralytics fuses ReID as  dists = min(iou, emb)  — the
# appearance term can only ADD matches, never remove them.  In a team sport
# teammates look near-identical, so their embedding distance is small and ReID
# happily links a track to the WRONG nearby teammate, creating swaps/fragments.
# No appearance_thresh value fixes this; it is inherent to generic-appearance
# ReID on uniform jerseys.  The real discriminator would be jersey-number OCR.
#
# => Use botsort_gmc.yaml instead.  This file stays only to document the test.
# `model: auto` is buggy on this ultralytics build, hence a real encoder path.

tracker_type: botsort

track_high_thresh: 0.25
track_low_thresh: 0.1
new_track_thresh: 0.30   # higher → fewer spurious brand-new tracks in crowds
track_buffer: 60         # keep lost tracks ~2.5s @ 24fps so brief occlusions re-link
match_thresh: 0.8
fuse_score: True

gmc_method: sparseOptFlow   # compensate broadcast camera motion before matching

# ReID
with_reid: True
model: yolo11n.pt           # real encoder (auto-downloads); "auto" is unreliable here
proximity_thresh: 0.5       # only ReID-match boxes that are already spatially close
appearance_thresh: 0.25     # min appearance similarity to allow a ReID re-link
